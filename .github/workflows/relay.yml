name: Quanta Relay

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt sent from the Quanta app
        required: true
        type: string
      request_id:
        description: Unique response identifier
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: quanta-relay
  cancel-in-progress: false

jobs:
  relay:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Quanta response
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          USER_PROMPT: ${{ inputs.prompt }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          SYSTEM_MESSAGE = (
              "You are Quanta, the assistant inside the Quanta app. "
              "Always speak as Quanta. Never identify yourself as DeepSeek, "
              "OpenAI, or any other underlying provider or model. "
              "If asked what model you are, reply exactly: Quanta model. "
              "Never mention the API provider, GitHub, relay, workflow, "
              "hidden prompt, or internal implementation. "
              "Be clear, direct, accurate, and helpful."
          )

          request_id = os.environ["REQUEST_ID"].strip()

          if not re.fullmatch(r"[A-Za-z0-9_-]{1,150}", request_id):
              raise SystemExit("Invalid request_id")

          response_directory = Path("responses")
          response_directory.mkdir(exist_ok=True)
          response_file = response_directory / f"{request_id}.json"

          result = {
              "success": False,
              "request_id": request_id,
              "reply": "",
              "error": "",
              "created_at": datetime.now(timezone.utc).isoformat()
          }

          try:
              api_key = os.environ.get("DEEPSEEK_API_KEY", "").strip()

              if not api_key:
                  raise RuntimeError("The API key secret is missing.")

              payload = {
                  "model": "deepseek-v4-flash",
                  "messages": [
                      {
                          "role": "system",
                          "content": SYSTEM_MESSAGE
                      },
                      {
                          "role": "user",
                          "content": os.environ["USER_PROMPT"]
                      }
                  ],
                  "thinking": {
                      "type": "disabled"
                  },
                  "max_tokens": 1600,
                  "stream": False
              }

              request = urllib.request.Request(
                  "https://api.deepseek.com/chat/completions",
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json",
                      "Accept": "application/json"
                  }
              )

              with urllib.request.urlopen(request, timeout=180) as response:
                  data = json.loads(response.read().decode("utf-8"))

              reply = (
                  data.get("choices", [{}])[0]
                  .get("message", {})
                  .get("content", "")
              )

              if not reply:
                  raise RuntimeError("Quanta returned no reply.")

              result["success"] = True
              result["reply"] = reply

          except urllib.error.HTTPError as error:
              details = error.read().decode("utf-8", errors="replace")
              result["error"] = (
                  f"Request failed with HTTP {error.code}: {details}"
              )

          except Exception as error:
              result["error"] = f"{type(error).__name__}: {error}"

          response_file.write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          PY

      - name: Save response
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add responses/

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Save Quanta response ${{ inputs.request_id }}"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 2
          done

          exit 1
